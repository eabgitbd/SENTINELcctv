<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | WebRTC CCTV</title>
    
    <!-- Google Fonts: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- UI DESIGN & VARIABLES --- */
        :root {
            --bg: #0a0a0f;
            --panel: #16161d;
            --accent: #00ff88;
            --accent-dim: #00aa55;
            --text: #e0e0e0;
            --error: #ff3333;
            --warning: #ffcc00;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- LAYOUT & CHROME --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--panel);
            border-bottom: 1px solid #333;
        }

        .logo { font-weight: 700; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        .user-controls { display: flex; align-items: center; gap: 15px; font-size: 0.9rem; }
        #user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--accent); }

        main { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-in; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BUTTONS --- */
        .btn {
            background: transparent; border: 1px solid var(--text); color: var(--text);
            padding: 10px 20px; cursor: pointer; font-family: var(--font); font-size: 1rem;
            transition: all 0.2s ease; text-transform: uppercase; border-radius: 4px;
        }
        .btn:hover:not(:disabled) { background: var(--text); color: var(--bg); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn.neon { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 5px var(--accent-dim) inset; }
        .btn.neon:hover:not(:disabled) { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px var(--accent); }
        
        .btn.danger { border-color: var(--error); color: var(--error); }
        .btn.danger:hover:not(:disabled) { background: var(--error); color: white; box-shadow: 0 0 15px var(--error); }

        input.neon-input {
            background: rgba(0,0,0,0.5); border: 1px solid #333; color: var(--accent);
            padding: 10px; font-family: var(--font); font-size: 1rem; border-radius: 4px; width: 150px;
        }
        input.neon-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 5px var(--accent-dim); }

        /* --- STATUS INDICATORS --- */
        .indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .indicator.live { background-color: var(--error); animation: blink 1.5s infinite; box-shadow: 0 0 8px var(--error); }
        .indicator.offline { background-color: #555; }
        .indicator.connecting { background-color: var(--warning); animation: blink 0.8s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        .mode-box { gap: 30px; flex-direction: row; flex-wrap: wrap; }
        .big-btn { padding: 30px 40px; font-size: 1.2rem; min-width: 300px; }

        #banner { position: fixed; top: 0; left: 0; right: 0; padding: 15px; text-align: center; z-index: 9999; font-weight: bold; display: none; }
        .banner-error { background: var(--error); color: white; }
        .banner-success { background: var(--accent-dim); color: white; }

        /* --- CAMERA MODE --- */
        .camera-container { max-width: 800px; margin: 0 auto; background: var(--panel); padding: 20px; border: 1px solid #333; border-radius: 8px; }
        .cam-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        #local-video { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; border: 1px solid #333; border-radius: 4px; margin-bottom: 15px; }
        .viewers-list { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .viewers-list ul { list-style: none; padding: 0; margin: 0; }
        .viewers-list li { font-size: 0.9rem; padding: 5px 0; color: #aaa; }

        /* --- VIEWER MODE --- */
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 1024px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }

        .camera-tile {
            background: var(--panel); border: 1px solid #333; display: flex; flex-direction: column; 
            aspect-ratio: 16/9; position: relative; overflow: hidden; border-radius: 6px; transition: box-shadow 0.3s;
        }
        .camera-tile.pulse { box-shadow: 0 0 15px var(--accent-dim); border-color: var(--accent); }
        .camera-tile.pinned { grid-column: 1 / -1; grid-row: span 2; min-height: 60vh; z-index: 10; }
        .camera-tile video { flex-grow: 1; background: #000; object-fit: cover; width: 100%; height: 100%; }
        
        .tile-overlay {
            position: absolute; top: 0; left: 0; right: 0; padding: 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
        }
        .tile-controls {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-wrap: wrap; gap: 5px;
        }
        .action-btns { display: none; gap: 5px; flex-wrap: wrap; justify-content: flex-end; width: 100%; }
        .action-btns .btn { padding: 4px 8px; font-size: 0.75rem; }

        .empty-placeholder {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #111; z-index: 5;
        }
        .empty-placeholder span { color: #666; font-size: 0.9rem; margin-top: 10px; }

        .spinner {
            width: 22px; height: 22px; border-radius: 50%;
            border: 3px solid #333; border-top-color: var(--warning);
            animation: spin 0.8s linear infinite; margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="banner"></div>

    <nav>
        <div class="logo">SENTINEL_</div>
        <div class="user-controls">
            <img id="user-avatar" src="" alt="Avatar" style="display:none;" />
            <span id="user-info">Awaiting Auth...</span>
            <span id="user-uid-tag" style="display:none; font-size:0.7rem; color:#666; border:1px solid #333; padding:2px 6px; border-radius:3px;" title="This must match on every device for cameras and viewers to see each other"></span>
            <button id="btn-logout" class="btn" style="display:none; padding: 5px 10px; font-size: 0.8rem;">Logout</button>
        </div>
    </nav>

    <main>
        <!-- SCREEN 1: LOGIN -->
        <section id="screen-1-login" class="screen active">
            <div class="center-box">
                <h1 style="margin-bottom: 5px;">SECURE ACCESS</h1>
                <p style="color: #666; margin-bottom: 30px;">Identify to access sentinel network</p>
                <button id="btn-login" class="btn neon big-btn">Login via Google</button>
            </div>
        </section>

        <!-- SCREEN 2: MODE SELECT -->
        <section id="screen-2-mode" class="screen">
            <div class="center-box mode-box">
                <button id="btn-start-camera" class="btn neon big-btn">
                    <div>[ ACT AS CAMERA ]</div>
                    <div style="font-size: 0.8rem; margin-top: 10px; color: var(--text);">Stream rear camera</div>
                </button>
                <button id="btn-start-viewer" class="btn neon big-btn">
                    <div>[ WATCH LIVE FEEDS ]</div>
                    <div style="font-size: 0.8rem; margin-top: 10px; color: var(--text);">Open dashboard</div>
                </button>
            </div>
        </section>

        <!-- SCREEN 3: CAMERA MODE -->
        <section id="screen-3-camera" class="screen">
            <div class="camera-container">
                <div class="cam-header">
                    <button id="btn-camera-home" class="btn danger" style="padding: 6px 12px; font-size: 0.85rem;">&lt; BACK TO HOME</button>
                    <input type="text" id="cam-label-input" class="neon-input" value="CAM-ALPHA" placeholder="Camera Name" />
                    <div><span class="indicator live"></span><span style="font-weight:bold; color:var(--error);">LIVE</span></div>
                </div>
                <video id="local-video" autoplay muted playsinline></video>
                <div style="display:flex; justify-content:flex-end; align-items:center;">
                    <span style="color:#666; font-size:0.8rem;" id="my-device-id-display"></span>
                </div>
                
                <div class="viewers-list">
                    <h3>Active Connections: <span id="viewer-count" style="color:var(--accent);">0</span></h3>
                    <ul id="viewers-ul"><li>Awaiting connections...</li></ul>
                </div>
            </div>
        </section>

        <!-- SCREEN 4: VIEWER MODE -->
        <section id="screen-4-viewer" class="screen">
            <div class="viewer-header">
                <button id="btn-viewer-home" class="btn danger" style="padding: 6px 12px; font-size: 0.85rem;">&lt; BACK TO HOME</button>
                <h2>CCTV DASHBOARD</h2>
            </div>
            <div id="camera-grid" class="grid">
                <!-- Camera Tiles injected dynamically -->
            </div>
            <p id="no-cameras-msg" style="display:none; text-align:center; color:#666; margin-top:60px;">No cameras registered yet. Start one in "Act as Camera" mode.</p>
        </section>
    </main>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCMaYbZBj6vDtkAkyNcj0JsK__rAij78eY",
            authDomain: "sentinelcctv-4e4b1.firebaseapp.com",
            projectId: "sentinelcctv-4e4b1",
            storageBucket: "sentinelcctv-4e4b1.firebasestorage.app",
            messagingSenderId: "500100280512",
            appId: "1:500100280512:web:9047a764aba7f21f073d25",
            measurementId: "G-C2RR9HZJWL"
        };

        const rtcConfig = { iceServers: [ { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' } ] };

        // IMPORTS (Firebase v12.15.0)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, addDoc, updateDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // INIT SERVICES
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Safety wrap analytics to prevent Ad-blocker crashes
        let analytics = null;
        try { analytics = getAnalytics(app); } catch (e) { console.warn("Analytics blocked."); }

        // GLOBAL STATE
        let currentUser = null;
        let dbBasePath = ''; 
        
        let myDeviceId = localStorage.getItem('sentinel_device_id');
        if (!myDeviceId) {
            myDeviceId = 'dev_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('sentinel_device_id', myDeviceId);
        }
        document.getElementById('cam-label-input').value = 'CAM-' + myDeviceId.substr(4, 4).toUpperCase();

        let localStream = null;
        let cameraUnsubscribes = [];
        let viewerConnections = {}; 
        let viewerUnsubMap = {}; // BUGFIX: track per-viewer unsubscribes so they can be cleaned up individually

        let dashboardUnsubscribe = null;
        let activeViewerPCs = {}; 
        let wakeLock = null;

        // ---- SAFETY HELPERS ----
        // BUGFIX: centralizes "run this, never let it throw" so cleanup functions
        // (stopCamera/stopViewer) can never be aborted mid-way by a single failing
        // unsubscribe/close call. This was the root cause of "Back to Home" appearing
        // to do nothing: an uncaught exception from a snapshot unsubscribe or an
        // already-closed RTCPeerConnection would stop execution before showScreen() ran.
        function safeRun(fn, label) {
            try { 
                const result = fn();
                if (result && typeof result.catch === 'function') {
                    result.catch(err => console.warn(`[safeRun:${label}]`, err));
                }
            } catch (err) {
                console.warn(`[safeRun:${label}]`, err);
            }
        }

        async function safeDeleteCollection(path) {
            try {
                const snap = await getDocs(collection(db, path));
                await Promise.all(snap.docs.map(d => deleteDoc(d.ref).catch(() => {})));
            } catch (err) { /* best-effort cleanup only */ }
        }

        // WAKE LOCK UTILS
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.warn("Wake Lock Error"); }
            }
        }
        async function releaseWakeLock() {
            if (wakeLock !== null) { try { await wakeLock.release(); wakeLock = null; } catch (err) {} }
        }
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                if (document.getElementById('screen-3-camera').classList.contains('active') || document.getElementById('screen-4-viewer').classList.contains('active')) {
                    await requestWakeLock();
                }
            }
        });

        // UI UTILS
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showBanner(msg, isError = true) {
            const b = document.getElementById('banner');
            b.innerText = msg; b.className = isError ? 'banner-error' : 'banner-success'; b.style.display = 'block';
            clearTimeout(showBanner._t);
            showBanner._t = setTimeout(() => { b.style.display = 'none'; }, 4000);
        }

        // AUTHENTICATION
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                dbBasePath = `users/${user.uid}`; // CLEAN PATH FOR PROJECT FIRESTORE
                document.getElementById('user-info').innerText = user.displayName || user.email || `Agent ${user.uid.substr(0,5)}`;
                const avatar = document.getElementById('user-avatar');
                if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
                else { avatar.style.display = 'none'; }
                document.getElementById('btn-logout').style.display = 'block';

                // BUGFIX: surface the account identity so a mismatch between two
                // devices (the original root cause of cameras being invisible on the
                // dashboard) is visible at a glance instead of failing silently.
                const uidTag = document.getElementById('user-uid-tag');
                uidTag.innerText = 'ID: ' + user.uid.substring(0, 8);
                uidTag.style.display = 'inline-block';
                if (user.isAnonymous) {
                    uidTag.style.color = 'var(--warning)';
                    uidTag.style.borderColor = 'var(--warning)';
                    showBanner('Signed in anonymously — this device will NOT see cameras/viewers signed in with your Google account. Please log out and sign in with Google on every device you use.', true);
                } else {
                    uidTag.style.color = '#666';
                    uidTag.style.borderColor = '#333';
                }

                showScreen('screen-2-mode');
            } else {
                document.getElementById('user-info').innerText = 'Awaiting Auth...';
                document.getElementById('user-avatar').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'none';
                document.getElementById('user-uid-tag').style.display = 'none';
                showScreen('screen-1-login');
            }
        });

        // BUGFIX (root cause of "dashboard shows nothing from another device"):
        // The old code fell back to signInAnonymously() whenever the popup failed —
        // which happens routinely on phones (in-app browsers, iOS Safari storage
        // partitioning, popup blockers). Anonymous sign-in mints a brand-new random
        // uid every time, completely unrelated to the real Google account. Since all
        // Firestore data lives under `users/${uid}/...`, a camera phone that silently
        // fell back to anonymous auth was writing to a totally different, invisible
        // path than the viewer's account — so the camera could never appear on the
        // dashboard. This had nothing to do with "Google activity interference"; it
        // was two devices ending up authenticated as two different identities with
        // zero indication that had happened.
        //
        // Fix: try popup first (best UX on desktop), and if it fails for any reason
        // OTHER than the user deliberately closing it, fall back to a full-page
        // redirect — which works reliably even in restrictive mobile/in-app browser
        // contexts — instead of silently downgrading to an anonymous, disconnected
        // identity. No more silent anonymous fallback, anywhere.
        async function doLogin() {
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerText = 'Connecting...';
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
                // onAuthStateChanged will handle navigation
            } catch (err) {
                console.warn("Popup sign-in failed, falling back to redirect:", err.code);
                if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
                    // User deliberately closed it — don't force a redirect on them, just reset the button.
                    btn.disabled = false;
                    btn.innerText = 'Login via Google';
                    return;
                }
                try {
                    await signInWithRedirect(auth, new GoogleAuthProvider());
                    // Page will navigate away here; nothing more to do.
                } catch (redirectErr) {
                    showBanner("Sign-in failed: " + redirectErr.message);
                    btn.disabled = false;
                    btn.innerText = 'Login via Google';
                }
            }
        }
        document.getElementById('btn-login').addEventListener('click', doLogin);

        // Complete a signInWithRedirect() flow if we just came back from one.
        getRedirectResult(auth).catch(err => {
            if (err && err.code && err.code !== 'auth/no-auth-event') {
                showBanner("Sign-in failed: " + err.message);
            }
        });
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await safeRun(() => stopCamera(), 'logout-stopCamera');
            await safeRun(() => stopViewer(), 'logout-stopViewer');
            await signOut(auth);
        });

        // CAMERA MODE
        document.getElementById('btn-start-camera').addEventListener('click', startCamera);
        document.getElementById('btn-camera-home').addEventListener('click', () => { stopCamera(); }); // BUGFIX: wrap so stopCamera's own internal errors (now safeRun-guarded) never block this handler
        
        document.getElementById('cam-label-input').addEventListener('change', async (e) => {
            if (!currentUser || !localStream) return;
            try { await updateDoc(doc(db, `${dbBasePath}/cameras`, myDeviceId), { label: e.target.value }); } catch(err) {}
        });

        async function startCamera() {
            const btn = document.getElementById('btn-start-camera');
            btn.disabled = true;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('my-device-id-display').innerText = `ID: ${myDeviceId}`;
                showScreen('screen-3-camera');
                await requestWakeLock();

                // BUGFIX: clear any stale signaling docs from a previous session before
                // announcing the camera as live, so leftover offers don't get re-processed.
                await safeDeleteCollection(`${dbBasePath}/sessions/${myDeviceId}/offers`);
                await safeDeleteCollection(`${dbBasePath}/sessions/${myDeviceId}/answers`);

                await setDoc(doc(db, `${dbBasePath}/cameras`, myDeviceId), {
                    label: document.getElementById('cam-label-input').value, status: 'live', timestamp: serverTimestamp()
                });

                const unsubOffers = onSnapshot(collection(db, `${dbBasePath}/sessions/${myDeviceId}/offers`), snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') handleNewViewerOffer(change.doc.id, change.doc.data());
                    });
                }, err => showBanner("Signaling error: " + err.message));
                
                cameraUnsubscribes.push(unsubOffers);
            } catch (err) {
                showBanner("Camera permission denied.");
            } finally {
                btn.disabled = false;
            }
        }

        async function handleNewViewerOffer(connId, offerData) {
            try {
                const pc = new RTCPeerConnection(rtcConfig);
                viewerConnections[connId] = pc;
                updateCameraDashboardUI();

                pc.ontrack = e => {
                    if (e.track.kind === 'audio') {
                        let remoteAudio = document.getElementById(`audio_${connId}`);
                        if (!remoteAudio) {
                            remoteAudio = document.createElement('audio');
                            remoteAudio.id = `audio_${connId}`; remoteAudio.autoplay = true;
                            document.body.appendChild(remoteAudio);
                        }
                        // Robust Stream attachment
                        if (e.streams && e.streams[0]) { remoteAudio.srcObject = e.streams[0]; } 
                        else { let ms = new MediaStream(); ms.addTrack(e.track); remoteAudio.srcObject = ms; }
                    }
                };

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                pc.onicecandidate = e => {
                    if (e.candidate) addDoc(collection(db, `${dbBasePath}/sessions/${myDeviceId}/iceCandidates_camera_${connId}`), e.candidate.toJSON()).catch(()=>{});
                };

                pc.onconnectionstatechange = () => {
                    if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
                        delete viewerConnections[connId]; updateCameraDashboardUI();
                        const audioEl = document.getElementById(`audio_${connId}`); if(audioEl) audioEl.remove();
                        // BUGFIX: clean up this viewer's dedicated ICE listener instead of
                        // letting it accumulate forever in cameraUnsubscribes.
                        if (viewerUnsubMap[connId]) { safeRun(viewerUnsubMap[connId], `ice-unsub-${connId}`); delete viewerUnsubMap[connId]; }
                    }
                };

                await pc.setRemoteDescription(new RTCSessionDescription(offerData));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                await setDoc(doc(db, `${dbBasePath}/sessions/${myDeviceId}/answers/${connId}`), { type: answer.type, sdp: answer.sdp });

                const unsubIce = onSnapshot(collection(db, `${dbBasePath}/sessions/${myDeviceId}/iceCandidates_viewer_${connId}`), snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
                    });
                });
                viewerUnsubMap[connId] = unsubIce; // BUGFIX: tracked per-connection now
                cameraUnsubscribes.push(unsubIce);
            } catch(e) { console.error("Error setting up viewer connection", e); }
        }

        function updateCameraDashboardUI() {
            const count = Object.keys(viewerConnections).length;
            document.getElementById('viewer-count').innerText = count;
            const ul = document.getElementById('viewers-ul');
            ul.innerHTML = '';
            if(count === 0) { ul.innerHTML = '<li>Awaiting connections...</li>'; return; }
            Object.keys(viewerConnections).forEach(id => {
                const li = document.createElement('li'); li.innerHTML = `&gt; Viewer <span style="color:var(--text);">${id.substr(0,8)}</span>`;
                ul.appendChild(li);
            });
        }

        async function stopCamera() {
            // BUGFIX: every cleanup step is now isolated with safeRun/try-catch so a
            // single failure (closing an already-closed RTCPeerConnection, an
            // unsubscribe throwing, a denied/offline deleteDoc) can no longer abort
            // the function before showScreen() runs. This was why "BACK TO HOME"
            // sometimes appeared completely unresponsive.
            if (localStream) {
                safeRun(() => localStream.getTracks().forEach(t => t.stop()), 'stop-tracks');
                localStream = null;
            }

            cameraUnsubscribes.forEach(fn => safeRun(fn, 'camera-unsub'));
            cameraUnsubscribes = [];
            viewerUnsubMap = {};

            Object.values(viewerConnections).forEach(pc => safeRun(() => pc && pc.close(), 'pc-close'));
            viewerConnections = {};
            updateCameraDashboardUI();

            // Remove any leftover remote-audio elements from viewers
            document.querySelectorAll('audio[id^="audio_"]').forEach(el => safeRun(() => el.remove(), 'audio-remove'));

            if (currentUser && dbBasePath) {
                safeRun(() => deleteDoc(doc(db, `${dbBasePath}/cameras`, myDeviceId)), 'delete-camera-doc');
                safeRun(() => safeDeleteCollection(`${dbBasePath}/sessions/${myDeviceId}/offers`), 'cleanup-offers');
                safeRun(() => safeDeleteCollection(`${dbBasePath}/sessions/${myDeviceId}/answers`), 'cleanup-answers');
            }

            // Always navigate home and release the wake lock, no matter what happened above.
            showScreen('screen-2-mode');
            safeRun(() => releaseWakeLock(), 'release-wakelock');
        }
        window.addEventListener('beforeunload', () => { if (localStream && dbBasePath) { deleteDoc(doc(db, `${dbBasePath}/cameras`, myDeviceId)).catch(()=>{}); } });

        // VIEWER MODE
        document.getElementById('btn-start-viewer').addEventListener('click', startViewer);
        document.getElementById('btn-viewer-home').addEventListener('click', () => { stopViewer(); }); // BUGFIX: same isolation pattern as camera-home

        function startViewer() {
            showScreen('screen-4-viewer');
            requestWakeLock();
            document.getElementById('camera-grid').innerHTML = '';
            document.getElementById('no-cameras-msg').style.display = 'none';

            // Listen for all cameras on the user's account
            // BUGFIX: the previous version only handled docChanges() of type
            // 'added'/'modified'/'removed' relative to changes since listener attach,
            // which is correct for live updates BUT the very first snapshot fires
            // 'added' for every existing camera anyway, so that part was fine.
            // The actual issue was that `renderCameraTile` could mark an existing,
            // currently-connecting/live tile back to 'AVAILABLE'/offline state
            // whenever Firestore re-delivered a snapshot (e.g. on reconnect or
            // metadata-only change), because the guard only checked the indicator's
            // current CSS class string instead of tracking real connection state.
            // Tracking state explicitly per tile fixes both the flicker and the
            // "connect does nothing" symptom.
            dashboardUnsubscribe = onSnapshot(collection(db, `${dbBasePath}/cameras`), snap => {
                snap.docChanges().forEach(change => {
                    const camId = change.doc.id;
                    const data = change.doc.data();
                    if (change.type === 'added' || change.type === 'modified') renderCameraTile(camId, data, 'available');
                    else if (change.type === 'removed') renderCameraTile(camId, data, 'offline');
                });
                updateEmptyState();
            }, err => showBanner("Failed to read cameras: " + err.message));
        }

        function updateEmptyState() {
            const grid = document.getElementById('camera-grid');
            document.getElementById('no-cameras-msg').style.display = grid.children.length === 0 ? 'block' : 'none';
        }

        function renderCameraTile(camId, data, state) {
            const grid = document.getElementById('camera-grid');
            let tile = document.getElementById(`tile-${camId}`);
            
            if (!tile) {
                tile = document.createElement('div');
                tile.id = `tile-${camId}`; tile.className = 'camera-tile';
                tile.dataset.connState = 'idle'; // BUGFIX: explicit connection-state tracker, independent of CSS classes
                tile.innerHTML = `
                    <div class="tile-overlay">
                        <div style="font-weight:bold; letter-spacing:1px;" class="cam-label"></div>
                        <div><span class="indicator"></span><span class="status-text font-small"></span></div>
                    </div>
                    <div class="empty-placeholder">
                        <span class="placeholder-msg">NO SIGNAL</span>
                        <span class="last-seen"></span>
                        <button class="btn danger remove-cam-btn" style="margin-top: 15px; font-size: 0.7rem; display: none; padding: 5px 10px;">[ FORGET CAMERA ]</button>
                    </div>
                    <video autoplay playsinline></video>
                    <div class="tile-controls">
                        <button class="btn connect-btn neon" style="padding: 5px 15px; font-size: 0.8rem;">CONNECT</button>
                        <div class="action-btns">
                            <button class="btn pin-btn" title="Pin Camera">[PIN]</button>
                            <button class="btn snap-btn" title="Take Screenshot">[SNAP]</button>
                            <button class="btn rec-btn" title="Record Video">[REC]</button>
                            <button class="btn mute-btn" title="Toggle Mute">[MUTE]</button>
                            <button class="btn talk-btn" title="Hold to Speak">[TALK]</button>
                            <button class="btn fullscreen-btn" title="Fullscreen">[FULL]</button>
                        </div>
                    </div>
                `;
                
                tile.querySelector('.connect-btn').onclick = () => connectToCamera(camId, tile);
                tile.querySelector('.fullscreen-btn').onclick = () => {
                    const vid = tile.querySelector('video');
                    if (!document.fullscreenElement) { vid.requestFullscreen().catch(err => showBanner("Fullscreen error")); } 
                    else { document.exitFullscreen(); }
                };
                tile.querySelector('.remove-cam-btn').onclick = async () => {
                    try {
                        await deleteDoc(doc(db, `${dbBasePath}/cameras`, camId));
                        disconnectTile(camId);
                        tile.remove();
                        updateEmptyState();
                    } catch (err) { showBanner("Remove failed: " + err.message); }
                };
                grid.appendChild(tile);
                updateEmptyState();
            }

            const labelEl = tile.querySelector('.cam-label');
            const statusText = tile.querySelector('.status-text');
            const indicator = tile.querySelector('.indicator');
            const placeholder = tile.querySelector('.empty-placeholder');
            const connectBtn = tile.querySelector('.connect-btn');
            
            if (data && data.label) labelEl.innerText = data.label;

            // BUGFIX: use the explicit dataset.connState tracker instead of sniffing
            // CSS class strings, so an "available"/"modified" snapshot event can never
            // stomp on a tile that is mid-negotiation or already live.
            const connState = tile.dataset.connState;

            if (state === 'offline') {
                tile.dataset.connState = 'idle';
                indicator.className = 'indicator offline'; statusText.innerText = 'OFFLINE';
                placeholder.style.display = 'flex'; placeholder.querySelector('.placeholder-msg').innerText = 'CONNECTION LOST';
                placeholder.querySelector('.last-seen').innerText = `Last detected: ${new Date().toLocaleTimeString()}`;
                placeholder.querySelector('.remove-cam-btn').style.display = 'block';
                connectBtn.style.display = 'block'; connectBtn.disabled = false; connectBtn.innerText = 'CONNECT';
                tile.classList.remove('pulse');
                tile.querySelector('video').srcObject = null;
                tile.querySelector('.action-btns').style.display = 'none';
                disconnectTile(camId);
            } else if (state === 'available' && (connState === 'idle' || connState === undefined)) {
                indicator.className = 'indicator offline'; statusText.innerText = 'AVAILABLE';
                placeholder.style.display = 'flex'; placeholder.querySelector('.placeholder-msg').innerText = 'STANDBY';
                placeholder.querySelector('.last-seen').innerText = ''; placeholder.querySelector('.remove-cam-btn').style.display = 'none';
                connectBtn.style.display = 'block'; connectBtn.disabled = false; connectBtn.innerText = 'CONNECT';
            }
            // If connState is 'connecting' or 'live', an 'available'/'modified' event
            // is intentionally ignored here — the live connection's own state machine
            // (in connectToCamera) owns the UI from this point on.
        }

        function disconnectTile(camId) {
            // BUGFIX: helper to tear down any active viewer connection tied to a tile,
            // e.g. when the camera goes offline or is removed while we're watching it.
            const entry = Object.entries(activeViewerPCs).find(([, v]) => v.camId === camId);
            if (entry) {
                const [connId, conn] = entry;
                safeRun(() => conn.pc && conn.pc.close(), `disconnect-${connId}`);
                (conn.unsubs || []).forEach(fn => safeRun(fn, `disconnect-unsub-${connId}`));
                delete activeViewerPCs[connId];
            }
        }

        async function connectToCamera(camId, tile) {
            const connId = 'conn_' + Math.random().toString(36).substr(2, 9);
            const btn = tile.querySelector('.connect-btn');
            const indicator = tile.querySelector('.indicator');
            const statusText = tile.querySelector('.status-text');
            const placeholder = tile.querySelector('.empty-placeholder');
            const videoElem = tile.querySelector('video');
            const actionBtns = tile.querySelector('.action-btns');

            tile.dataset.connState = 'connecting';
            btn.disabled = true; btn.innerText = 'NEGOTIATING...';
            indicator.className = 'indicator connecting'; statusText.innerText = 'CONNECTING';
            placeholder.style.display = 'flex';
            placeholder.querySelector('.placeholder-msg').innerHTML = '';
            const spinner = document.createElement('div'); spinner.className = 'spinner';
            placeholder.querySelector('.placeholder-msg').appendChild(spinner);
            placeholder.querySelector('.placeholder-msg').appendChild(document.createTextNode('CONNECTING'));
            placeholder.querySelector('.last-seen').innerText = '';
            placeholder.querySelector('.remove-cam-btn').style.display = 'none';

            // BUGFIX: a hard timeout so a stalled WebRTC negotiation (e.g. blocked by
            // a strict NAT/firewall with no TURN server configured — this app only
            // ships STUN servers) doesn't leave the tile stuck on "NEGOTIATING..."
            // forever with no feedback. This was very likely the main reason "live
            // feed from dashboard is not working": connections can hang silently.
            const negotiationTimeout = setTimeout(() => {
                if (tile.dataset.connState === 'connecting') {
                    showBanner(`Connection to ${camId} timed out. The camera and viewer may be on networks that require a TURN server.`);
                    disconnectTile(camId);
                    renderCameraTile(camId, { label: tile.querySelector('.cam-label').innerText }, 'available');
                }
            }, 15000);

            try {
                const pc = new RTCPeerConnection(rtcConfig);
                let unsubs = [];
                activeViewerPCs[connId] = { pc, unsubs, camId };

                pc.addTransceiver('video', { direction: 'recvonly' });
                const audioTransceiver = pc.addTransceiver('audio', { direction: 'sendrecv' });

                // Robust Stream attachment (Fixes blank videos on some browsers)
                pc.ontrack = e => {
                    if (e.streams && e.streams[0]) {
                        if (videoElem.srcObject !== e.streams[0]) videoElem.srcObject = e.streams[0];
                    } else {
                        let ms = new MediaStream(); ms.addTrack(e.track); videoElem.srcObject = ms;
                    }
                    // BUGFIX: some browsers attach the track but never fire 'loadedmetadata'
                    // until play() is explicitly (re)triggered, leaving a black/frozen tile
                    // even though connectionState reports 'connected'.
                    videoElem.play().catch(() => {});
                };

                const pinBtn = tile.querySelector('.pin-btn');
                const snapBtn = tile.querySelector('.snap-btn');
                const recBtn = tile.querySelector('.rec-btn');
                const muteBtn = tile.querySelector('.mute-btn');
                const talkBtn = tile.querySelector('.talk-btn');

                pinBtn.onclick = () => { tile.classList.toggle('pinned'); pinBtn.classList.toggle('neon'); if (tile.classList.contains('pinned')) tile.scrollIntoView({behavior: "smooth", block: "center"}); };
                snapBtn.onclick = () => {
                    if (!videoElem.videoWidth) { showBanner("No video frame to capture yet."); return; }
                    const canvas = document.createElement('canvas'); canvas.width = videoElem.videoWidth || 1280; canvas.height = videoElem.videoHeight || 720;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
                    const a = document.createElement('a'); a.href = canvas.toDataURL('image/jpeg', 0.9);
                    a.download = `sentinel_snap_${camId}_${Date.now()}.jpg`; a.click();
                };

                let mediaRecorder = null; let recordedChunks = [];
                recBtn.onclick = () => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop(); recBtn.innerText = '[REC]'; recBtn.classList.remove('danger', 'neon');
                    } else {
                        const stream = videoElem.srcObject; if (!stream) { showBanner("No active stream to record."); return; }
                        try {
                            const options = MediaRecorder.isTypeSupported('video/webm') ? { mimeType: 'video/webm' } : { mimeType: 'video/mp4' };
                            mediaRecorder = new MediaRecorder(stream, options); recordedChunks = [];
                            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                            mediaRecorder.onstop = () => {
                                const format = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                                const blob = new Blob(recordedChunks, { type: options.mimeType }); const url = URL.createObjectURL(blob);
                                const a = document.createElement('a'); a.href = url; a.download = `sentinel_rec_${camId}_${Date.now()}.${format}`; a.click(); URL.revokeObjectURL(url);
                            };
                            mediaRecorder.start(); recBtn.innerText = '[STOP]'; recBtn.classList.add('danger', 'neon');
                        } catch (err) { showBanner("Recording not supported."); }
                    }
                };

                muteBtn.onclick = () => { videoElem.muted = !videoElem.muted; muteBtn.innerText = videoElem.muted ? '[UNMUTE]' : '[MUTE]'; muteBtn.classList.toggle('danger', videoElem.muted); };

                let localMicStream = null; let isTalking = false;
                const startTalking = async (e) => {
                    e.preventDefault(); if (isTalking) return;
                    if (!localMicStream) { try { localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (err) { showBanner("Mic denied"); return; } }
                    const audioTrack = localMicStream.getAudioTracks()[0]; audioTrack.enabled = true;
                    await audioTransceiver.sender.replaceTrack(audioTrack);
                    talkBtn.classList.add('neon', 'danger'); talkBtn.innerText = '[TALKING]'; isTalking = true;
                };
                const stopTalking = (e) => {
                    e.preventDefault();
                    if (isTalking && localMicStream) { localMicStream.getAudioTracks()[0].enabled = false; talkBtn.classList.remove('neon', 'danger'); talkBtn.innerText = '[TALK]'; isTalking = false; }
                };
                talkBtn.onmousedown = startTalking; talkBtn.onmouseup = stopTalking; talkBtn.onmouseleave = stopTalking;
                talkBtn.ontouchstart = startTalking; talkBtn.ontouchend = stopTalking;

                pc.onconnectionstatechange = () => {
                    if (pc.connectionState === 'connected') {
                        clearTimeout(negotiationTimeout);
                        tile.dataset.connState = 'live';
                        indicator.className = 'indicator live'; statusText.innerText = 'LIVE'; placeholder.style.display = 'none';
                        btn.style.display = 'none'; actionBtns.style.display = 'flex'; tile.classList.add('pulse');
                    } else if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
                        clearTimeout(negotiationTimeout);
                        tile.dataset.connState = 'idle';
                        renderCameraTile(camId, { label: tile.querySelector('.cam-label').innerText }, 'available');
                        actionBtns.style.display = 'none';
                        unsubs.forEach(fn => safeRun(fn, `viewer-unsub-${connId}`)); delete activeViewerPCs[connId];
                        if (pc.connectionState === 'failed') showBanner(`Lost connection to ${camId}.`);
                    }
                };

                pc.onicecandidate = e => { if (e.candidate) addDoc(collection(db, `${dbBasePath}/sessions/${camId}/iceCandidates_viewer_${connId}`), e.candidate.toJSON()).catch(()=>{}); };

                const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
                await setDoc(doc(db, `${dbBasePath}/sessions/${camId}/offers/${connId}`), { type: offer.type, sdp: offer.sdp });

                const unsubAns = onSnapshot(collection(db, `${dbBasePath}/sessions/${camId}/answers`), snap => {
                    snap.docChanges().forEach(change => { if (change.doc.id === connId && change.type === 'added') pc.setRemoteDescription(new RTCSessionDescription(change.doc.data())).catch(()=>{}); });
                }, err => console.warn('answer listener error', err));
                unsubs.push(unsubAns);

                const unsubIce = onSnapshot(collection(db, `${dbBasePath}/sessions/${camId}/iceCandidates_camera_${connId}`), snap => {
                    snap.docChanges().forEach(change => { if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{}); });
                }, err => console.warn('ice listener error', err));
                unsubs.push(unsubIce);
            } catch (err) {
                clearTimeout(negotiationTimeout);
                tile.dataset.connState = 'idle';
                showBanner("Failed to connect: " + err.message);
                renderCameraTile(camId, { label: tile.querySelector('.cam-label').innerText }, 'available');
            }
        }

        function stopViewer() {
            // BUGFIX: same isolation pattern as stopCamera — every step wrapped so a
            // single throw can't block navigation back to the home screen.
            if (typeof dashboardUnsubscribe === 'function') safeRun(dashboardUnsubscribe, 'dashboard-unsub');
            dashboardUnsubscribe = null;

            Object.values(activeViewerPCs).forEach(conn => {
                safeRun(() => conn.pc && conn.pc.close(), 'viewer-pc-close');
                (conn.unsubs || []).forEach(fn => safeRun(fn, 'viewer-conn-unsub'));
            });
            activeViewerPCs = {};

            safeRun(() => { document.getElementById('camera-grid').innerHTML = ''; }, 'clear-grid');
            showScreen('screen-2-mode');
            safeRun(() => releaseWakeLock(), 'release-wakelock-viewer');
        }
    </script>
</body>
</html>
